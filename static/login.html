<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICU Dashboard — Sign in</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2.5rem 3rem;
      border: 1px solid #333;
      border-radius: 12px;
    }
    h1 { margin: 0 0 1.5rem 0; font-size: 1.4rem; }
    a.login-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      background: #2a5cd6;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    a.login-btn:hover { background: #3568e0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ICU Dashboard</h1>
    <a class="login-btn" href="/auth/login">Sign in with Google</a>
  </div>
</body>
</html>
