<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICU — Platform Command Layer</title>
<style>
  :root {
    --bg: #0d1117;
    --card-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --running: #3fb950;
    --idle: #484f58;
    --paused: #d29922;
    --error: #f85149;
    --halted: #6e7681;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; letter-spacing: 0.02em; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--card-bg); }
  .pill .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .global-controls button { margin-left: 8px; }
  button {
    background: #21262d; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  button:hover { background: #30363d; }
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-left: 4px solid var(--idle);
    border-radius: 8px; padding: 14px 16px;
  }
  .card-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .card-title { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .anim-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--running); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .meta { color: var(--text-dim); font-size: 12px; margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .controls button { margin-left: 6px; }
  .log-toggle { margin-top: 8px; background: none; border: none; color: var(--text-dim); font-size: 12px; cursor: pointer; padding: 0; }
  .log-panel { display: none; margin-top: 10px; background: #010409; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: ui-monospace, monospace; font-size: 12px; max-height: 260px; overflow-y: auto; }
  .log-panel.open { display: block; }
  .log-filter { margin-bottom: 6px; }
  .log-filter button { padding: 3px 8px; font-size: 11px; }
  .log-line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>ICU — Platform Command Layer</h1>
    <div class="summary" id="summary"></div>
    <div class="global-controls">
      <button onclick="resumeAll()">Resume All</button>
      <button onclick="haltAll()">Halt All</button>
      <a href="/auth/logout" style="margin-left:8px;color:var(--text-dim);font-size:12px;text-decoration:none;">Logout</a>
    </div>
  </div>
  <div class="cards" id="cards"></div>

<script>
const STATE_COLORS = { RUNNING: 'var(--running)', IDLE: 'var(--idle)', PAUSED: 'var(--paused)', ERROR: 'var(--error)', HALTED: 'var(--halted)' };
const openPanels = new Set();
const logFilters = {};

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function controlsFor(id, status) {
  const i = id.replace(/'/g, "\\'");
  const map = {
    IDLE:    [['Run Now', `runNow('${i}')`],       ['Pause',  `setAllowed('${i}', false)`]],
    RUNNING: [['Pause',   `setAllowed('${i}', false)`], ['Halt', `setAllowed('${i}', false)`]],
    PAUSED:  [['Resume',  `setAllowed('${i}', true)`]],
    ERROR:   [['Run Now', `runNow('${i}')`],       ['Halt',   `setAllowed('${i}', false)`]],
    HALTED:  [['Resume',  `setAllowed('${i}', true)`]],
  };
  return map[status] || [];
}

async function setAllowed(id, allowed) {
  await fetchJSON(`/control/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({allowed_to_run: allowed}) });
  refresh();
}
async function runNow(id) {
  try { await fetchJSON(`/trigger/${id}`, { method: 'POST' }); } catch (e) { alert('Trigger failed: ' + e.message); }
  refresh();
}
async function resumeAll() { await fetchJSON('/api/resume-all', { method: 'POST' }); refresh(); }
async function haltAll() { await fetchJSON('/api/halt-all', { method: 'POST' }); refresh(); }

function toggleLog(id) {
  if (openPanels.has(id)) { openPanels.delete(id); } else { openPanels.add(id); loadLog(id); }
  render(window.__lastComponents || []);
}

async function loadLog(id) {
  const panel = document.getElementById('log-' + id);
  if (!panel) return;
  try {
    const data = await fetchJSON(`/logs/${id}?lines=50`);
    const filter = logFilters[id] || 'ALL';
    let lines = data.lines;
    if (filter === 'WARN') {
      lines = lines.filter(l => /warn|error|critical/i.test(l));
    }
    const logLines = panel.querySelector('.log-lines');
	  logLines.innerHTML = lines.map(l => `<div class="log-line">${escapeHtml(l)}</div>`).join('') || '<div class="log-line">(no lines)</div>';
      setTimeout(() => { panel.scrollTop = panel.scrollHeight; }, 50);
  } catch (e) {
    panel.querySelector('.log-lines').innerHTML = `<div class="log-line">Error loading log: ${escapeHtml(e.message)}</div>`;
  }
}

function setFilter(id, filter) {
  logFilters[id] = filter;
  loadLog(id);
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(components) {
  window.__lastComponents = components;
  const counts = { RUNNING:0, IDLE:0, PAUSED:0, ERROR:0, HALTED:0 };
  components.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });
  document.getElementById('summary').innerHTML = Object.entries(counts).map(([s,n]) =>
    `<span class="pill"><span class="dot" style="background:${STATE_COLORS[s]}"></span>${s} · ${n}</span>`
  ).join('');

  document.getElementById('cards').innerHTML = components.map(c => {
    const color = STATE_COLORS[c.status] || STATE_COLORS.IDLE;
    const isOpen = openPanels.has(c.component_id);
    const filter = logFilters[c.component_id] || 'ALL';
    return `
    <div class="card" style="border-left-color:${color}">
      <div class="card-top">
        <div class="card-title">
          ${c.status === 'RUNNING' ? '<span class="anim-dot"></span>' : ''}
          ${escapeHtml(c.display_name)}
          <span class="badge" style="background:${color};color:#0d1117">${c.status}</span>
        </div>
        <div class="controls">
          ${controlsFor(c.component_id, c.status).map(([label, action]) =>
			`<button onclick="${escapeHtml(action)}">${label}</button>`).join('')}
        </div>
      </div>
      <div class="meta">
        <span>${escapeHtml(c.component_id)}</span>
        <span>last run: ${c.last_run_utc || '—'}</span>
        <span>result: ${c.last_run_result || '—'}</span>
        <span>${c.schedule_string}${c.expected_interval ? ' · ' + c.expected_interval : ''} · last push: ${c.received_at || '—'}</span>
        <span>${c.version || '—'} · ${c.github_repo_tag || '—'}</span>
      </div>
      <button class="log-toggle" onclick="toggleLog('${c.component_id}')">${isOpen ? '▾ hide log' : '▸ show log'}</button>
      <div class="log-panel ${isOpen ? 'open' : ''}" id="log-${c.component_id}">
        <div class="log-filter">
          <button onclick="setFilter('${c.component_id}','ALL')" style="${filter==='ALL'?'font-weight:700':''}">ALL</button>
          <button onclick="setFilter('${c.component_id}','WARN')" style="${filter==='WARN'?'font-weight:700':''}">WARN+</button>
        </div>
        <div class="log-lines">loading…</div>
      </div>
    </div>`;
  }).join('') || '<div class="meta">No components registered yet.</div>';

  openPanels.forEach(id => loadLog(id));
}

async function refresh() {
  try {
    const components = await fetchJSON('/api/components');
    render(components);
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
