<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICU Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .card {
      text-align: center;
      padding: 2rem 3rem;
      border: 1px solid #333;
      border-radius: 12px;
      min-width: 280px;
      margin-bottom: 1.5rem;
    }
    h1 { margin: 0 0 1rem 0; font-size: 1.5rem; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      border: 1px solid #444;
      background: #1a1a1a;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }
    .status-pill.running .dot { background: #3ecf5f; }
    .status-pill.running { border-color: #245c33; color: #7ee79a; }
    .status-pill.paused .dot { background: #e0a72e; }
    .status-pill.paused { border-color: #6b551c; color: #f3c968; }
    .status-pill.idle .dot { background: #888; }
    .status-pill.idle { border-color: #444; color: #aaa; }
    .status-pill.unknown .dot { background: #c0392b; }
    .status-pill.unknown { border-color: #6b2320; color: #e07a72; }

    .updated {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #666;
    }

    .controls {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.25rem;
    }
    .controls button {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .controls button:hover:not(:disabled) { background: #232323; }
    .controls button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    #btn-pause { border-color: #6b551c; color: #f3c968; }
    #btn-resume { border-color: #245c33; color: #7ee79a; }
    #btn-halt { border-color: #6b2320; color: #e07a72; }

    .control-msg {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: #888;
      min-height: 1em;
    }

    /* Log panel */
    .log-panel {
      width: 100%;
      max-width: 900px;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      background: #0c0c0c;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #333;
      background: #161616;
    }
    .log-header select {
      background: #1a1a1a;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
    }
    .log-header .log-meta {
      font-size: 0.75rem;
      color: #666;
    }
    #log-output {
      margin: 0;
      padding: 1rem;
      max-height: 420px;
      overflow-y: auto;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 0.8rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      color: #ccc;
    }
    #log-output .line { }
    #log-output .line:nth-last-child(-n+3) { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ICU Dashboard</h1>
    <div style="font-size: 0.75rem; color: #666; margin: -0.75rem 0 1rem;">
      <span id="whoami">—</span> · <a href="/auth/logout" style="color: #888;">Sign out</a>
    </div>
    <div id="status" class="status-pill unknown">
      <span class="dot"></span>
      <span id="status-text">CHECKING...</span>
    </div>
    <div class="updated" id="updated">—</div>

    <div class="controls">
      <button id="btn-pause" onclick="doControl('pause')">Pause</button>
      <button id="btn-resume" onclick="doControl('resume')">Resume</button>
      <button id="btn-halt" onclick="doControl('halt')" disabled>Halt</button>
    </div>
    <div class="control-msg" id="control-msg"></div>
  </div>

  <div class="log-panel">
    <div class="log-header">
      <select id="log-select"></select>
      <span class="log-meta" id="log-updated">—</span>
    </div>
    <pre id="log-output">Loading…</pre>
  </div>

  <script>
    let currentLog = null;
    let autoScroll = true;

    async function pollState() {
      const pill = document.getElementById('status');
      const text = document.getElementById('status-text');
      const updated = document.getElementById('updated');
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        const state = (data.state || 'UNKNOWN').toUpperCase();
        pill.className = 'status-pill ' + state.toLowerCase();
        text.textContent = state;
        updated.textContent = 'Updated ' + new Date().toLocaleTimeString();
        updateControlAvailability(state);
      } catch (err) {
        pill.className = 'status-pill unknown';
        text.textContent = 'UNREACHABLE';
        updated.textContent = 'Last check failed';
        updateControlAvailability('UNKNOWN');
      }
    }

    function updateControlAvailability(state) {
      const pauseBtn = document.getElementById('btn-pause');
      const resumeBtn = document.getElementById('btn-resume');
      const haltBtn = document.getElementById('btn-halt');

      // Halt only ever enabled once the flag has actually been set to
      // paused — this is the deliberate two-stage gate: pause first,
      // let any in-flight file write finish, then halt becomes available.
      haltBtn.disabled = (state !== 'PAUSED');
      pauseBtn.disabled = (state === 'PAUSED' || state === 'IDLE');
      resumeBtn.disabled = (state === 'RUNNING' || state === 'IDLE');
    }

    async function doControl(action) {
      const msg = document.getElementById('control-msg');
      msg.textContent = `Sending ${action}…`;
      try {
        const res = await fetch(`/api/control/${action}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = `${action} failed: ${data.detail || 'unknown error'}`;
          return;
        }
        msg.textContent = `${action}: ${data.detail || data.result}`;
        await pollState();
      } catch (err) {
        msg.textContent = `${action} failed: request error`;
      }
    }

    async function initLogSelect() {
      const select = document.getElementById('log-select');
      try {
        const res = await fetch('/api/logs/list');
        const data = await res.json();
        select.innerHTML = '';
        data.files.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f;
          opt.textContent = f;
          if (f === data.default) opt.selected = true;
          select.appendChild(opt);
        });
        currentLog = data.default;
      } catch (err) {
        select.innerHTML = '<option>error loading list</option>';
      }
      select.addEventListener('change', () => {
        currentLog = select.value;
        pollLog();
      });
    }

    async function pollLog() {
      if (!currentLog) return;
      const output = document.getElementById('log-output');
      const meta = document.getElementById('log-updated');

      // preserve scroll position unless user is already at the bottom
      const wasAtBottom = output.scrollTop + output.clientHeight >= output.scrollHeight - 10;

      try {
        const res = await fetch(`/api/logs?file=${encodeURIComponent(currentLog)}&lines=150`);
        if (!res.ok) throw new Error('bad response');
        const data = await res.json();
        output.innerHTML = data.lines.map(l =>
          `<div class="line">${escapeHtml(l)}</div>`
        ).join('');
        meta.textContent = 'Updated ' + new Date().toLocaleTimeString();

        if (wasAtBottom) {
          output.scrollTop = output.scrollHeight;
        }
      } catch (err) {
        meta.textContent = 'Fetch failed';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadWhoami() {
      try {
        const res = await fetch('/api/whoami');
        const data = await res.json();
        document.getElementById('whoami').textContent = data.email || 'unknown';
      } catch (err) {
        document.getElementById('whoami').textContent = 'unknown';
      }
    }

    (async function start() {
      loadWhoami();
      await initLogSelect();
      pollState();
      pollLog();
      setInterval(pollState, 5000);
      setInterval(pollLog, 5000);
    })();
  </script>
</body>
</html>
